version: 2
updates:
  - package-ecosystem: "npm" # covers package.json / Bun across the monorepo
    directories:
      - "/" # root: turbo + workspace tooling
      - "/apps/cli" # the published CLI
      - "/apps/web" # the Next.js marketing/docs site
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # ESLint 10 is not yet supported by the Next.js lint stack:
      # eslint-config-next pins eslint-plugin-react@^7.37.x, and no released
      # eslint-plugin-react works with ESLint 10 (it still calls the removed
      # context.getFilename() API). Re-enable once the ecosystem ships support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
