name: Release CLI
on:
  push:
    tags: ["v*"] # created by `npm version` in apps/cli
permissions:
  contents: write # create the GitHub Release for the pushed tag
  id-token: write # OIDC: tokenless publish + automatic provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24" # ships npm 11.x; trusted publishing needs node>=22.14
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # guarantee npm >= 11.5.1
      - run: bun install --frozen-lockfile
      - run: npm publish --access public # prepack builds dist; OIDC tokenless; provenance auto
        working-directory: apps/cli
      - run: gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }} # built-in; scoped by `contents: write` above
          TAG: ${{ github.ref_name }} # the pushed v* tag; via env to avoid run-step injection
