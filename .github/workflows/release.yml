name: Release CLI
# Releases are version-driven: merge a PR that bumps apps/cli/package.json's
# "version" and this workflow publishes that version to npm, tags v<version>,
# and cuts the GitHub Release — all in one run. No manual git tagging required
# (which branch protection on main would block anyway). The release/publish is
# idempotent: if the tag already exists or the version is already on npm, it
# skips. Use the workflow_dispatch button to re-run a release on demand.
on:
  push:
    branches: [main]
    paths: ["apps/cli/package.json"]
  workflow_dispatch: {}
permissions:
  contents: write # push the v<version> tag + create the GitHub Release
  id-token: write # OIDC: tokenless npm publish + automatic provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24" # ships npm 11.x; trusted publishing needs node>=22.14
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # guarantee npm >= 11.5.1
      - name: Decide whether to release
        id: gate
        run: |
          VERSION=$(node -p "require('./apps/cli/package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          elif npm view "claude-wrapped-cli@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::claude-wrapped-cli@$VERSION already on npm — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Releasing claude-wrapped-cli@$VERSION ($TAG)."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.release == 'true'
        run: bun install --frozen-lockfile
      - if: steps.gate.outputs.release == 'true'
        run: npm publish --access public # prepack builds dist; OIDC tokenless; provenance auto
        working-directory: apps/cli
      - name: Tag and create GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }} # built-in; scoped by `contents: write` above
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          # Tag AFTER a successful publish so a publish failure leaves no tag to
          # block a retry. This tag push won't re-trigger the workflow (built-in
          # token + the trigger keys off branch/path, not tags).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "claude-wrapped-cli $TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag
